<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Snowhill Construction Consulting</title>
  <meta name="robots" content="noindex" />

  <!-- GA tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EFCM01N5GX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EFCM01N5GX');

    gtag('event', 'generate_lead', {
      event_category: 'form',
      event_label: 'snowhill_contact_form'
    });
  </script>
     
  <style>
    :root {
      --bg: #f6f4ef;
      --surface: #ffffff;
      --text: #1f1f1f;
      --muted: #5f5a52;
      --border: #d8d1c7;
      --accent: #5d4632;
      --accent-2: #877159;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .wrap {
      width: min(100% - 2rem, var(--max));
      margin: 0 auto;
    }

    header {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(93, 70, 50, 0.12);
      background: rgba(246, 244, 239, 0.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--accent);
      white-space: nowrap;
    }

    .thank-you {
      padding: 6rem 0 5rem;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 0.9rem;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 1.08;
      color: var(--accent);
    }

    .card p {
      margin: 0 0 1rem;
      font-size: 1.08rem;
      color: var(--muted);
    }

    .cta-row {
      margin-top: 1.75rem;
      display: flex;
      justify-content: center;
      gap: 0.85rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 1.15rem;
      border-radius: 999px;
      border: 1px solid var(--accent);
      font-weight: 700;
      font-size: 0.96rem;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #4c3929;
      text-decoration: none;
    }

    .small {
      font-size: 0.92rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    footer {
      padding: 2rem 0 3rem;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      .card {
        padding: 1.75rem;
      }

      .cta-row {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="nav">
        <div class="brand">Snowhill Construction Consulting</div>
      </div>
    </div>
  </header>

  <main class="thank-you">
    <div class="wrap">
      <section class="card">
        <span class="eyebrow">Message Received</span>
        <h1>Thank you.</h1>
        <p>Appreciate the reach out. I’ll review and follow up.</p>
        <p class="small">Snowhill Construction Consulting</p>

        <div class="cta-row">
          <a class="btn btn-primary" href="/">Return to Snowhill</a>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="wrap">
      Snowhill Construction Consulting
    </div>
  </footer>
</body>
</html>
